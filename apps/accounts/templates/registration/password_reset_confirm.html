{% extends 'base.html' %}
{% block content %}
<div class="parchment-scroll shadow-lg">
  <h2>Set New Password</h2>
  {% if validlink %}
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn-medieval" type="submit">Change Password</button>
  </form>
  {% else %}
  <p class="text-danger">This reset link is invalid or has expired.</p>
  <a href="{% url 'accounts:password_reset' %}" class="btn-medieval">Request New Link</a>
  {% endif %}
</div>
{% endblock %}
