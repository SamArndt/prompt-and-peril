{% extends 'base.html' %}

{% block title %}Password reset{% endblock %}

{% block content %}

<div class="parchment-scroll shadow-lg">
  <div class="wax-seal"></div>
  <h1>Forgot Password?</h1>
  <p>Enter your email address below, and we'll email instructions for setting a new one.</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button class="mt-3 btn-medieval" type="submit">
      Send reset email
    </button>
  </form>
</div>
{% endblock %}
